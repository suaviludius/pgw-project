name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.kanbn/**'

jobs:
  # Локальная сборка и тесты через Makefile
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libsqlite3-dev libssl-dev

      - name: Configure CMake
        run: make configure

      - name: Build project
        run: make build

      - name: Run tests
        run: make test

